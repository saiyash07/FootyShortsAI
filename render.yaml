services:
  - type: web
    name: footyshorts-ai
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./automation.db
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_SECRETS_JSON
        sync: false
      - key: GOOGLE_DRIVE_TOKEN_JSON
        sync: false
      - key: GOOGLE_YOUTUBE_TOKEN_JSON
        sync: false
